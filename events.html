  <style>
    /* Events Grid */
    #eventsContainer {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      max-width: 450px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    /* Individual Event Card */
    .ev-card {
      background: #111;
      border: 2px solid var(--gold, #f6d28a);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .ev-card-meta {
      color: #ccc;
      font-size: 0.95rem;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .ev-card-title {
      color: #f6d28a;
      font-size: 1.8rem;
      margin: 0;
    }
    .ev-card-desc {
      color: #eee;
      line-height: 1.7;
      font-size: 0.9rem;
    }
    .ev-remind-btn {
      margin-top: 0.5rem;
      background: #f6d28a;
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 100px;
      padding: 14px 2rem;
      cursor: pointer;
      width: 100%;
      letter-spacing: 2px;
      transition: opacity 0.2s;
    }
    .ev-remind-btn:hover { opacity: 0.85; }
    .ev-remind-btn:active { opacity: 0.7; }

    /* Reminder Modal */
    #reminderOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 99999;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }
    #reminderOverlay.open { display: flex; }
    #reminderBox {
      background: #fff;
      border-radius: 24px;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    #reminderBox h2 { color: #111; margin: 0 0 0.5rem; font-size: 1.5rem; }
    #reminderBox p  { color: #555; margin: 0 0 1.2rem; font-size: 0.9rem; }
    #reminderBox #rem_event_name { color: #111; font-weight: 700; margin-bottom: 1rem; font-size: 1rem; }
    #rem_email_input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 50px;
      border: 1px solid #ccc;
      font-size: 1rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
      text-align: center;
    }
    .rem-btns { display: flex; gap: 10px; }
    #rem_submit { flex: 2; background: #f6d28a; color: #000; font-weight: 700; border: none; border-radius: 50px; padding: 13px; cursor: pointer; font-size: 0.95rem; }
    #rem_cancel { flex: 1; background: #eee; color: #333; border: none; border-radius: 50px; padding: 13px; cursor: pointer; font-size: 0.9rem; }

    @media (max-width: 600px) {
      .ev-card { padding: 1.5rem; }
      .ev-card-title { font-size: 1.4rem; }
    }
  </style>
