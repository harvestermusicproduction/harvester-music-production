  <style>
    /* Premium Footprints Gallery */
    .footprints-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 3rem;}
    .footprint-item { 
      position: relative; 
      overflow: hidden; 
      border-radius: 12px; 
      aspect-ratio: 1/1; 
      background: #000;
      border: 1px solid rgba(246,210,138,0.1);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .footprint-img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1), filter 0.5s; 
      filter: grayscale(40%); 
    }
    .footprint-item:hover .footprint-img { 
      transform: scale(1.1); 
      filter: grayscale(0%); 
    }
    .footprint-overlay { 
      position: absolute; 
      bottom: 0; left: 0; right: 0; 
      /* 底部 80% 白色，顶部 0% 全透明渐变 */
      background: linear-gradient(to top, rgba(255, 255, 255, 0.8) 30%, rgba(255, 255, 255, 0) 100%) !important;
      padding: 3rem 1.5rem 1.5rem; 
      transform: translateY(100%); 
      transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1); 
      font-size: 0.95rem;
      color: #111 !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    .footprint-item:hover .footprint-overlay { 
      transform: translateY(0); 
    }
    .footprint-desc {
      margin: 0;
      line-height: 1.4;
      font-family: 'Noto Serif SC', serif;
      opacity: 0.9;
    }
    @media (max-width: 768px) {
      .footprint-overlay {
        padding: 1.5rem !important;
        font-size: 0.85rem !important;
      }
      .text-gold { font-size: 1.8rem !important; }
      p.text-center { font-size: 0.85rem !important; padding: 0 1rem; }
    }
  </style>
</head>
