  <style>
    /* Premium Footprints Gallery */
    .footprints-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 3rem;}
    .footprint-item { 
      position: relative; 
      overflow: hidden; 
      border-radius: 12px; 
      aspect-ratio: 1/1; 
      background: #000;
      border: 1px solid rgba(246,210,138,0.1);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .footprint-img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1), filter 0.5s; 
      filter: grayscale(40%); 
    }
    .footprint-item:hover .footprint-img { 
      transform: scale(1.1); 
      filter: grayscale(0%); 
    }
    .footprint-overlay { 
      position: absolute; 
      bottom: 0; left: 0; right: 0; 
      background: rgba(255, 255, 255, 0.85) !important;
      padding: 1.5rem; 
      transform: translateY(100%); 
      transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1); 
      font-size: 0.95rem;
      color: #333 !important; /* Dark text for readability on white */
      backdrop-filter: blur(25px) !important;
      -webkit-backdrop-filter: blur(25px) !important;
    }
    .footprint-item:hover .footprint-overlay { 
      transform: translateY(0); 
    }
    .footprint-desc {
      margin: 0;
      line-height: 1.4;
      font-family: 'Noto Serif SC', serif;
      opacity: 0.9;
    }
  </style>
</head>
