  <style>
    /* Events Grid */
    #eventsContainer {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      max-width: 750px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    /* Individual Event Card */
    .ev-card {
      background: #111;
      border: 2px solid var(--gold, #f6d28a);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .ev-card-meta {
      color: #ccc;
      font-size: 0.95rem;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .ev-card-title {
      color: #f6d28a;
      font-size: 1.8rem;
      margin: 0;
    }
    .ev-card-desc {
      color: #eee;
      line-height: 1.7;
      font-size: 0.9rem;
    }
    .ev-remind-btn {
      margin-top: 0.5rem;
      background: #f6d28a;
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 100px;
      padding: 14px 2rem;
      cursor: pointer;
      width: 100%;
      letter-spacing: 2px;
      transition: opacity 0.2s;
    }
    .ev-remind-btn:hover { opacity: 0.85; }
    .ev-remind-btn:active { opacity: 0.7; }

    /* Reminder Modal */
    #reminderOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 99999;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }
    #reminderOverlay.open { display: flex; }
    #reminderBox {
      background: #fff;
      border-radius: 24px;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    #reminderBox h2 { color: #111; margin: 0 0 0.5rem; font-size: 1.5rem; }
    #reminderBox p  { color: #555; margin: 0 0 1.2rem; font-size: 0.9rem; }
    #reminderBox #rem_event_name { color: #111; font-weight: 700; margin-bottom: 1rem; font-size: 1rem; }
    #rem_email_input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 50px;
      border: 1px solid #ccc;
      font-size: 1rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
      text-align: center;
    }
    .rem-btns { display: flex; gap: 10px; }
    #rem_submit { flex: 2; background: #f6d28a; color: #000; font-weight: 700; border: none; border-radius: 50px; padding: 13px; cursor: pointer; font-size: 0.95rem; }
    #rem_cancel { flex: 1; background: #eee; color: #333; border: none; border-radius: 50px; padding: 13px; cursor: pointer; font-size: 0.9rem; }

    @media (max-width: 600px) {
      .ev-card { padding: 1.5rem; }
      .ev-card-title { font-size: 1.4rem; }
    }
  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="config.js"></script>
  <script src="app.js?v=4.7.8"></script>

  <!-- Self-contained events logic: does NOT depend on app.js loading correctly -->
  <script>
    (function() {
      const SUPABASE_URL = "https://ollfdarbmiahgjaqivpg.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9sbGZkYXJibWlhaGdqYXFpdnBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTI2OTgsImV4cCI6MjA5MDc4ODY5OH0.hn7JoD3dX3wiQ3ia_A1GQMsGwfRwiNUQ_2Nu4UdstfI";

      let currentEventId = null;
      let currentEventTitle = null;
      let currentEventDate = null;

      // Modal logic
      const overlay = document.getElementById('reminderOverlay');
      const cancelBtn = document.getElementById('rem_cancel');
      const submitBtn = document.getElementById('rem_submit');
      const emailInput = document.getElementById('rem_email_input');
      const eventNameEl = document.getElementById('rem_event_name');

      cancelBtn.addEventListener('click', function() {
        overlay.classList.remove('open');
      });
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.classList.remove('open');
      });

      submitBtn.addEventListener('click', async function() {
        const email = emailInput.value.trim();
        if (!email || !email.includes('@')) {
          alert('请输入有效的邮箱地址');
          return;
        }
        submitBtn.textContent = '提交中...';
        submitBtn.disabled = true;
        try {
          const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          await db.from('event_reminders').insert([{
            eventId: currentEventId,
            eventTitle: currentEventTitle,
            eventDate: currentEventDate,
            userEmail: email,
            reminderSent: false
          }]);
          alert('✅ 提醒设置成功！收割机届时将通知您。');
          overlay.classList.remove('open');
          emailInput.value = '';
        } catch(err) {
          alert('提交失败，请稍后再试：' + err.message);
        }
        submitBtn.textContent = '🔔 提交';
        submitBtn.disabled = false;
      });

      // Load events
      async function loadEvents() {
        const container = document.getElementById('eventsContainer');
        try {
          const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          const { data: events, error } = await db.from('events').select('*').order('date', { ascending: true });
          if (error) throw error;
          if (!events || events.length === 0) {
            container.innerHTML = '<p style="text-align:center; opacity:0.5; color:#fff;">暂无活动，敬请期待。</p>';
            return;
          }

          container.innerHTML = events.map(function(e) {
            const date = e.date ? new Date(e.date).toLocaleDateString('zh-CN') : 'TBA';
            const time = e.time || '';
            let desc = (e.description || '').replace(/EXT_META:.*?\|\|/g, '').trim();
            const loc = e.location || '';
            const mapUrl = e.map_url || '';
            const locHtml = loc
              ? (mapUrl
                  ? '<a href="' + mapUrl + '" target="_blank" style="color:#f6d28a;"><i class="fas fa-map-marker-alt"></i> ' + loc + '</a>'
                  : '<span><i class="fas fa-map-marker-alt"></i> ' + loc + '</span>')
              : '';
            const eventDate = e.event_date || e.date || '';

            return '<div class="ev-card">' +
              '<div class="ev-card-meta">' +
                '<span><i class="fas fa-calendar-alt"></i> ' + date + '</span>' +
                (time ? '<span><i class="fas fa-clock"></i> ' + time + '</span>' : '') +
                (locHtml ? locHtml : '') +
              '</div>' +
              '<h3 class="ev-card-title">' + e.title + '</h3>' +
              (desc ? '<p class="ev-card-desc">' + desc + '</p>' : '') +
              '<button class="ev-remind-btn" data-id="' + e.id + '" data-title="' + encodeURIComponent(e.title) + '" data-date="' + eventDate + '">我要参与 / 提醒我</button>' +
            '</div>';
          }).join('');

          // Attach click events
          container.querySelectorAll('.ev-remind-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
              currentEventId = btn.getAttribute('data-id');
              currentEventTitle = decodeURIComponent(btn.getAttribute('data-title'));
              currentEventDate = btn.getAttribute('data-date');
              eventNameEl.textContent = '《' + currentEventTitle + '》';
              emailInput.value = '';
              overlay.classList.add('open');
            });
          });

        } catch(err) {
          container.innerHTML = '<p style="text-align:center; color:#f88; opacity:0.8;">加载失败：' + err.message + '</p>';
        }
      }

      // Wait for supabase to be available
      function waitAndLoad() {
        if (typeof supabase !== 'undefined' && supabase.createClient) {
          loadEvents();
        } else {
          setTimeout(waitAndLoad, 100);
        }
      }
      waitAndLoad();
    })();
  </script>
