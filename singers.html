  <!-- PPT Style Header -->
  <div class="ppt-header fade-in" style="position:fixed; top:5rem; left:0; width:100%; z-index:100; pointer-events:none;">
    <div class="ppt-line"></div>
    
    <h1 class="ppt-title" style="color:var(--gold);">歌手系统</h1>
    <p class="ppt-subtitle">THE VOICES OF HARVEST FIELD</p>
  </div>

  <!-- Category Selection Tabs -->
  <div class="singer-categories fade-in" style="position:fixed; top:18rem; left:50%; transform:translateX(-50%); z-index:1000; display:flex; gap:2rem;">
    <button onclick="switchCategory('all')" id="tab-all" class="tab-btn active">全部作品</button>
    <button onclick="switchCategory('福音')" id="tab-gospel" class="tab-btn">福音歌手</button>
    <button onclick="switchCategory('敬拜')" id="tab-worship" class="tab-btn">敬拜歌手</button>
  </div>

  <style>
    .singer-categories {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      padding: 0.8rem 2rem;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .tab-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 1rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.3s;
      padding: 5px 15px;
      position: relative;
    }
    .tab-btn.active {
      color: var(--gold);
      font-weight: 500;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 2px;
      background: var(--gold);
      border-radius: 2px;
    }
    .tab-btn:hover {
      color: #fff;
    }
  </style>

  <!-- Detail Card Overlay (Glassmorphism) -->
  <div id="singer-card-overlay" class="hidden">
    <div class="singer-card">
      <button class="close-card">&times;</button>
      <div class="card-content">
        <div class="card-left">
          <img id="card-img" src="" alt="Singer Profile">
        </div>
        <div class="card-right">
          <h2 id="card-name" class="text-gold"></h2>
          <div id="card-role" class="role-tag"></div>
          <p id="card-bio"></p>
          <div class="card-footer">
            <span style="color:#666; font-size:0.8rem;">[ 已收割作品 • 收割机音乐 ]</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Audio Background (Optional) -->
  <audio id="ambient-wind" loop>
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-light-wind-blowing-1165.mp3" type="audio/mpeg">
  </audio>
  
  <div id="harvest-label" class="harvest-hud-label"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
