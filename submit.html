      .btn-submit { min-width: 160px !important; padding: 8px 25px !important; font-size: 0.85rem !important; }

        <a id="cfg_nav_ig" href="https://www.instagram.com/harvestermusic.production?igsh=MTI2OGYzcDJuYm16dw==" target="_blank" style="color: #888; transition: 0.3s;"><i class="fab fa-instagram"></i></a>

  <div id="mobileNavOverlay">
    <a href="index.html">主页</a>
    <a href="music.html">音乐与歌谱集</a>

  <div class="ppt-header fade-in">
    <div class="ppt-line"></div>
    <div class="ppt-meta">
      <span class="ppt-number">07</span>
      <span>CREATIVE / 创作投稿</span>
    </div>
    <h1 class="ppt-title">我要投稿</h1>
    <p class="ppt-subtitle">SHARING YOUR MUSICAL GIFTS</p>
  </div>

  <section class="fade-in" style="max-width: 900px; margin-left: auto; margin-right: auto; padding: 2rem; padding-top: 0;">
    
    <div id="cfg_submit_text" class="frosted-glass-white kaiti-quote" style="padding: 3rem; border-radius: 30px; line-height: 1.8; color: #333; font-size: 1.1rem; background: rgba(255, 255, 255, 0.5) !important; backdrop-filter: blur(20px) !important; -webkit-backdrop-filter: blur(20px) !important; border: 1px solid rgba(255,255,255,0.2); white-space: normal !important;">
      <!-- Content from Supabase (cfg_submit_text) will hydrate here -->
    </div>
    
    <div style="margin-top: 3.5rem; display: flex; flex-direction: column; align-items: flex-end; gap: 1rem; max-width: 500px; margin-left: auto; margin-right: auto;">
      <div style="background: transparent; padding: 0; width: 100%; text-align: center;">
        <img id="cfg_submit_poster" src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&w=1200&q=80" alt="Submit Poster" style="width: 100%; height: auto; border-radius: 24px; display: block; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
      </div>
      <a id="cfg_submit_btn_link" href="#" class="btn btn-submit" style="min-width: 180px; text-align: center; text-decoration: none; padding: 10px 35px; font-size: 0.9rem; letter-spacing: 2px; border-radius: 50px;">我要投稿</a>
    </div>

    <div class="contact" style="margin-top: 4rem;">
        <form class="contact-form" onsubmit="event.preventDefault(); alert('作品已提交记录 (Simulation).');">
          <input type="text" placeholder="您的真实姓名或乐队名称" required>
          <input type="email" placeholder="您的联络邮箱" required>
          <input type="url" placeholder="歌曲云端试听链接 (Soundcloud / Google Drive)" required>
          <textarea placeholder="这首歌的由来与你的见证故事..." rows="6" required></textarea>
          <button type="submit" class="btn btn-submit" style="border-radius: 50px;">确认并提交作品</button>
        </form>
      </div>
    </div>
  </section>

    <footer style="position:relative; z-index:5; padding: 4rem 2rem; text-align: center;">
    <a href="admin.html" style="display:inline-block; transition:0.3s; opacity:0.8;">
      <img src="assets/logo.png" alt="Harvester" style="height: 80px; display: block; margin: 0 auto 1.2rem;">
    </a>
    <p style="font-size:0.85rem; opacity:0.6;">&copy; 2026 Harvester Music Production. 版权所有。</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    document.querySelector('.contact-form').onsubmit = async function(e) {
      e.preventDefault();
      const btn = this.querySelector('button');
      btn.innerText = '提交中...';
      btn.disabled = true;

      const data = {
        user_name: this.elements[0].value,
        contact_info: this.elements[1].value,
        file_url: this.elements[2].value,
        message: this.elements[3].value
      };

      try {
        const { error } = await window.supabase.from('submissions').insert([data]);
        if (error) throw error;
        alert('感谢您的投稿！收割机团队将尽快与您联络。');
        this.reset();
      } catch (err) {
        alert('提交失败: ' + err.message);
      } finally {
        btn.innerText = '确认并提交作品';
        btn.disabled = false;
      }
    };
  </script>
</body>
