<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我要投稿 Submit - Harvester Music Production</title>
  <link rel="stylesheet" href="styles.css?v=4.6.3">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="position: relative;">
  <canvas id="bgParticles"></canvas>
  <header class="scrolled">
    <div class="logo-group" style="display: flex; align-items: center; gap: 1.5rem;">
      <a href="index.html" class="logo" style="text-decoration:none; color:inherit;">Harvester</a>
      <div class="header-socials" style="display: flex; gap: 0.8rem; font-size: 1rem;">
        <a id="cfg_nav_fb" href="https://www.facebook.com/harvester2025" target="_blank" style="color: #888; transition: 0.3s;"><i class="fab fa-facebook-f"></i></a>
        <a id="cfg_nav_ig" href="https://www.instagram.com/harvestermusic.production?igsh=MTI2OGYzcDJuYm16dw==" target="_blank" style="color: #888; transition: 0.3s;"><i class="fab fa-instagram"></i></a>
        <a id="cfg_nav_yt" href="https://www.youtube.com/@harvestermusic.production" target="_blank" style="color: #888; transition: 0.3s;"><i class="fab fa-youtube"></i></a>
      </div>
    </div>
        <nav class="nav-links">
      <a href="index.html">主页</a>
      <a href="music.html">音乐与歌谱集</a>
      <a href="feedback.html">回声空间</a>
      <a href="events.html">活动</a>
      <a href="diary.html">田野日志</a>
      <a href="singers.html">福音歌手</a>
      <a href="submit.html" class="active">我要投稿</a>
      <a href="about.html">关于我们</a>
      <a href="support.html">支持我们</a>
      <a href="contact.html">联系我们</a>
    </nav>
  </header>

  <section class="fade-in" style="margin-top: 5rem; max-width: 900px; margin-left: auto; margin-right: auto; padding: 2rem;">
    <h1 class="text-gold text-center mb-4" style="font-size: 3rem; font-family: var(--font-display);">关于投稿</h1>
    
    <div class="frosted-glass-white kaiti-quote" style="padding: 3rem; border-radius: 30px; line-height: 1.0; color: #333; font-size: 1.1rem; background: rgba(255, 255, 255, 0.5) !important; backdrop-filter: blur(20px) !important; -webkit-backdrop-filter: blur(20px) !important; border: 1px solid rgba(255,255,255,0.2);">
      <p style="white-space: nowrap;">所有经收割机制作与发行的作品，词曲版权由收割机拥有七年。七年后归还作者。</p>
      <p style="margin-top: 0.8rem;">🔸 所有作品将以「收割机EP」形式发行。</p>
      <p style="margin-top: 0.5rem;">🔸 发行时将在 FB / IG / YouTube 标注所有创作者，给予应有尊重。</p>
      <p style="margin-top: 0.8rem; font-weight: bold; color: #000;">（有兴趣投稿可以扫描图中QR，或点击我要投稿）</p>
    </div>
    
    <div style="margin-top: 3.5rem; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
      <div style="background: transparent; padding: 0; max-width: 500px; width: 100%; text-align: center;">
        <img id="cfg_submit_poster" src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&w=1200&q=80" alt="Submit Poster" style="width: 100%; height: auto; border-radius: 24px; display: block; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
      </div>
      <a id="cfg_submit_btn_link" href="#" class="btn btn-submit" style="min-width: 180px; text-align: center; text-decoration: none; padding: 10px 35px; font-size: 0.9rem; letter-spacing: 2px; border-radius: 50px;">我要投稿</a>
    </div>

    <div class="contact" style="margin-top: 4rem;">
        <form class="contact-form" onsubmit="event.preventDefault(); alert('作品已提交记录 (Simulation).');">
          <input type="text" placeholder="您的真实姓名或乐队名称" required>
          <input type="email" placeholder="您的联络邮箱" required>
          <input type="url" placeholder="歌曲云端试听链接 (Soundcloud / Google Drive)" required>
          <textarea placeholder="这首歌的由来与你的见证故事..." rows="6" required></textarea>
          <button type="submit" class="btn btn-submit" style="border-radius: 50px;">确认并提交作品</button>
        </form>
      </div>
    </div>
  </section>

  <footer>
    <a href="index.html" style="display:block; opacity:0.75; transition:0.3s;"><img src="assets/logo.png" alt="Harvester" style="height: 50px; width: auto; margin: 0 auto 1rem; display: block; filter:brightness(0.8);"></a>
    <p>&copy; 2026 Harvester Music Production. 版权所有。为主献上。</p>
  <a href="admin.html" class="btn-terminal" style="margin-top: 1.5rem;"><i class="fas fa-terminal"></i> 进入控制台 ACCESS TERMINAL</a>  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    document.querySelector('.contact-form').onsubmit = async function(e) {
      e.preventDefault();
      const btn = this.querySelector('button');
      btn.innerText = '提交中...';
      btn.disabled = true;

      const data = {
        user_name: this.elements[0].value,
        contact_info: this.elements[1].value,
        file_url: this.elements[2].value,
        message: this.elements[3].value
      };

      try {
        const { error } = await window.supabase.from('submissions').insert([data]);
        if (error) throw error;
        alert('感谢您的投稿！收割机团队将尽快与您联络。');
        this.reset();
      } catch (err) {
        alert('提交失败: ' + err.message);
      } finally {
        btn.innerText = '确认并提交作品';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
