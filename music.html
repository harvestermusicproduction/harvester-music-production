  <style>
    /* ── Song Work Card ── */
    .song-work-card {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 2.5rem;
      align-items: start;
      background: rgba(255, 255, 255, 0.08) !important;
      backdrop-filter: blur(25px) !important;
      -webkit-backdrop-filter: blur(25px) !important;
      border: 1px solid rgba(255, 255, 255, 0.15) !important;
      border-radius: 24px !important;
      padding: 2.5rem;
      margin-bottom: 3rem;
      transition: var(--transition);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .song-work-card:hover {
      border-color: rgba(255, 255, 255, 0.3) !important;
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.12) !important;
    }

    /* ── Mini Vinyl ── */
    .mini-vinyl-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .mini-vinyl {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at center,
        #111 0%, #1a1a1a 28%, #222 30%, #1a1a1a 32%, #222 34%,
        #111 48%, #1a1a1a 50%, #222 52%, #111 58%, #1a1a1a 100%);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.15), 0 8px 30px rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      animation: mvSpin 5s linear infinite;
      animation-play-state: paused;
      transition: box-shadow 0.3s;
    }
    .mini-vinyl.playing {
      animation-play-state: running;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.6), 0 0 40px rgba(255, 255, 255, 0.15);
    }
    /* Spin on card hover */
    .song-work-card:hover .mini-vinyl {
      animation-play-state: running;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5), 0 0 30px rgba(255, 255, 255, 0.12);
    }

    /* --- 🎶 Musical Note Particles (Animated) --- */
    .note-particle {
      position: absolute;
      pointer-events: none;
      color: var(--gold);
      filter: drop-shadow(0 0 5px rgba(246,210,138,0.9));
      user-select: none;
      font-size: 1.5rem;
      z-index: 100;
      opacity: 0;
      animation: float-note-up 2.5s ease-out forwards;
    }

    @keyframes float-note-up {
      0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
      20% { opacity: 0.8; }
      100% { transform: translate(var(--dx, 20px), -150px) scale(1.2) rotate(var(--rot, 20deg)); opacity: 0; }
    }
    .mini-vinyl img {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #333;
      pointer-events: none;
    }
    @keyframes mvSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .song-work-card {
        grid-template-columns: 1fr !important;
        gap: 1.5rem !important;
        padding: 1.5rem !important;
        text-align: center !important;
      }
      .mini-vinyl {
        width: 140px !important;
        height: 140px !important;
      }
      .mini-vinyl img {
        width: 60px !important;
        height: 60px !important;
      }
      .song-card-title {
        font-size: 1.5rem !important;
      }
      .song-meta {
        font-size: 0.8rem !important;
      }
      .music-actions {
        flex-direction: column !important;
        gap: 1rem !important;
      }
    }

    /* ── Song Content ── */
    .song-content-area { display: flex; flex-direction: column; gap: 1rem; }
    .song-card-title {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--gold);
      font-weight: 400;
      margin: 0;
    }
    .song-card-desc { color: #bbb; font-size: 0.95rem; line-height: 1.8; margin: 0; }
    .song-card-verse {
      font-family: var(--font-display);
      font-style: italic;
      color: #888;
      font-size: 0.9rem;
      border-left: 2px solid rgba(246,210,138,0.4);
      padding-left: 1rem;
      margin: 0;
      line-height: 1.7;
    }
    .song-card-actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .song-audio-ctrl {
      flex: 1;
      min-width: 200px;
      height: 38px;
    }

    @media (max-width: 768px) {
      .song-work-card { grid-template-columns: 1fr; }
      .mini-vinyl-wrap { flex-direction: row; }
    }
  </style>
