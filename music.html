  <style>
    /* ── Song Work Card ── */
    .song-work-card {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 2.5rem;
      align-items: start;
      background: #101010;
      border: 1px solid rgba(246,210,138,0.12);
      border-radius: 8px;
      padding: 2.5rem;
      margin-bottom: 3rem;
      transition: border-color 0.4s, transform 0.4s;
    }
    .song-work-card:hover {
      border-color: rgba(246,210,138,0.4);
      transform: translateY(-3px);
    }

    /* ── Mini Vinyl ── */
    .mini-vinyl-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .mini-vinyl {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at center,
        #111 0%, #1a1a1a 28%, #222 30%, #1a1a1a 32%, #222 34%,
        #111 48%, #1a1a1a 50%, #222 52%, #111 58%, #1a1a1a 100%);
      box-shadow: 0 0 0 2px rgba(246,210,138,0.15), 0 8px 30px rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      animation: mvSpin 5s linear infinite;
      animation-play-state: paused;
      transition: box-shadow 0.3s;
    }
    .mini-vinyl.playing {
      animation-play-state: running;
      box-shadow: 0 0 0 2px rgba(246,210,138,0.6), 0 0 40px rgba(246,210,138,0.15);
    }
    /* Spin on card hover */
    .song-work-card:hover .mini-vinyl {
      animation-play-state: running;
      box-shadow: 0 0 0 2px rgba(246,210,138,0.5), 0 0 30px rgba(246,210,138,0.12);
    }
    /* JS-driven smoke note particles */
    .note-particle {
      position: absolute;
      pointer-events: none;
      color: var(--gold);
      filter: drop-shadow(0 0 4px rgba(246,210,138,0.9));
      user-select: none;
      font-style: normal;
      transition: none;
    }
    .mini-vinyl img {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #333;
      pointer-events: none;
    }
    .vinyl-play-overlay {
      position: absolute;
      width: 36px; height: 36px;
      background: rgba(246,210,138,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #252525;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    @keyframes mvSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Song Content ── */
    .song-content-area { display: flex; flex-direction: column; gap: 1rem; }
    .song-card-title {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--gold);
      font-weight: 400;
      margin: 0;
    }
    .song-card-desc { color: #bbb; font-size: 0.95rem; line-height: 1.8; margin: 0; }
    .song-card-verse {
      font-family: var(--font-display);
      font-style: italic;
      color: #888;
      font-size: 0.9rem;
      border-left: 2px solid rgba(246,210,138,0.4);
      padding-left: 1rem;
      margin: 0;
      line-height: 1.7;
    }
    .song-card-actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .song-audio-ctrl {
      flex: 1;
      min-width: 200px;
      height: 38px;
    }
    .btn-dl-score {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 0.55rem 1.4rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-decoration: none;
      border-radius: 2px;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .btn-dl-score:hover {
      background: var(--gold);
      color: #252525;
    }

    @media (max-width: 768px) {
      .song-work-card { grid-template-columns: 1fr; }
      .mini-vinyl-wrap { flex-direction: row; }
    }
  </style>
