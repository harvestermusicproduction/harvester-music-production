<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS 后台管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=4.6.3">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050508 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      overflow: hidden;
    }
    .auth-container {
      background: #111;
      border: 1px solid rgba(246, 210, 138, 0.2);
      border-radius: 12px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      position: relative;
      z-index: 10;
      text-align: center;
      transition: all 0.5s ease;
    }
    .auth-container.hidden {
      opacity: 0;
      visibility: hidden;
      transform: scale(0.9);
      pointer-events: none;
    }
    .auth-title {
      font-family: var(--font-display);
      color: var(--gold);
      font-size: 2rem;
      margin-bottom: 2rem;
    }
    .auth-input-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .auth-input-group label {
      display: block;
      color: #888;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    .auth-input-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #252525;
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 4px;
      transition: border-color 0.3s;
    }
    .auth-input-group input:focus {
      border-color: var(--gold);
      outline: none;
    }
    .auth-error {
      color: #ff4444;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    .btn-login, .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--gold) 0%, #e5b05a 100%);
      color: #000;
      padding: 0.9rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(246, 210, 138, 0.3);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn-login:hover, .btn-submit:hover {
      background: #fff;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 25px rgba(246, 210, 138, 0.5);
    }
    .btn-login:active, .btn-submit:active {
      transform: translateY(1px);
    }
    
    .btn-tiny {
      padding: 6px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-tiny:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(246, 210, 138, 0.05);
    }

    .btn-tiny.danger {
      color: #ff4444;
    }
    .btn-tiny.danger:hover {
      background: rgba(255, 68, 68, 0.1);
      border-color: #ff4444;
      color: #fff;
    }
    
    .btn-home {
      display: block;
      margin-top: 1.5rem;
      color: #666;
      font-size: 0.8rem;
      text-decoration: none;
      transition: 0.3s;
    }
    .btn-home:hover {
      color: var(--gold);
    }
    
    /* CMS Layout styles */
    .cms-layout aside nav a {
      font-size: 0.9rem;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
      display: block;
      margin-bottom: 5px;
    }
    .cms-layout aside nav a:hover {
      background: rgba(255,255,255,0.05);
    }
    
    input[type="text"], input[type="file"], textarea {
      padding: 10px;
      background: #151515;
      border: 1px solid #333;
      color: #eee;
      border-radius: 6px;
      margin-top: 5px;
    }
    input:focus, textarea:focus {
      border-color: var(--gold);
      outline: none;
    }

    #adminDashboard {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a0a;
      z-index: 20;
      display: none;
    }
    #adminDashboard.active {
      display: block;
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="authLoading" style="position:fixed; z-index:999; color:var(--gold); font-family:var(--font-display); font-size:1.5rem;">
    验证身份中 (Authenticating)...
  </div>

  <!-- Login Form -->
  <div class="auth-container hidden" id="loginBox">
    <div class="auth-title">System Admin</div>
    <form id="loginForm">
      <div class="auth-input-group">
        <label>Email Address</label>
        <input type="email" id="txtEmail" required placeholder="admin@domain.com">
      </div>
      <div class="auth-input-group">
        <label>Password</label>
        <div style="position:relative;">
          <input type="password" id="txtPassword" required placeholder="••••••••" style="padding-right: 40px;">
          <i class="fa-solid fa-eye" id="togglePassword" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); color:#666; cursor:pointer;"></i>
        </div>
      </div>
      <div class="auth-error" id="loginError">账号或密码错误 (Invalid Credentials)</div>
      <button type="submit" class="btn-login" id="btnLogin">授权进入 (Login)</button>
    </form>
    <div style="display:flex; justify-content:center; margin-top:1.5rem;">
      <a href="index.html" class="btn-home">← 返回主页 (Back to Home)</a>
    </div>
  </div>

  <!-- Dashboard Container -->
  <div id="adminDashboard"></div>

  <!-- Scripts -->
  <script>
    // 强制保险：如果 5 秒后还在加载，强行显示登录框
    (function() {
      console.log("Admin: Standby Fail-safe Initialized...");
      setTimeout(function() {
        var loader = document.getElementById('authLoading');
        var login = document.getElementById('loginBox');
        if (loader && loader.style.display !== 'none') {
          console.warn("Admin: Boot timeout, forcing UI...");
          loader.style.display = 'none';
          if (login) login.classList.remove('hidden');
        }
      }, 5000);
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="config.js?v=2.0"></script>
  <script src="admin.js?v=2.2"></script>
</body>
</html>
